services:
  - type: web
    name: loyalty-app
    env: php
    buildCommand: "composer install --no-dev && php artisan config:cache"
    startCommand: "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: false